<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Lemmata</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --teal: #0F6E56;
      --teal-hover: #0b5a46;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --text-primary: #e5e5e5;
        --text-secondary: #9ca3af;
        --teal: #2ea67a;
        --teal-hover: #3bbf8e;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .lambda {
      font-size: 120px;
      font-weight: 700;
      color: var(--teal);
      line-height: 1;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 400px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: var(--teal);
      color: #ffffff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--teal-hover);
    }

    .footer {
      position: absolute;
      bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="lambda">λ</div>
  <h1>Page not found</h1>
  <p class="subtitle">The page you're looking for doesn't exist or has been moved.</p>
  <a href="https://lemmata.app" class="btn">Back to Lemmata &rarr;</a>
  <div class="footer">Lemmata — Topic Modeling for the Humanities</div>
</body>
</html>
